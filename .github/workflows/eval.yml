name: eval

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: poetry

      - name: Install dependencies
        run: poetry install --with dev,dashboard

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Type-check (mypy)
        run: poetry run mypy

      - name: Test (pytest)
        run: poetry run pytest -q

      - name: Check evalset JSON Schema is up to date
        run: |
          poetry run python scripts/export_schema.py
          git diff --exit-code evalsets/schema

      - name: Run offline mock eval + build report
        run: poetry run python scripts/generate_sample.py

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-report
          path: reports/sample_report.html
